#define F_CPU 16000000UL

#include <avr/io.h>
#include <util/delay.h>

int main(void)
{
  
    DDRD |= (1 << PD3);
    DDRD |= (1 << PD4);
    DDRD |= (1 << PD5);

   
    DDRD &= ~(1 << PD2);

    while (1)
    {
       
        PORTD |= (1 << PD3);
        _delay_ms(1000);

        PORTD &= ~(1 << PD3);
        _delay_ms(1000);

       
        if (PIND & (1 << PD2))
        {
            
            PORTD |= (1 << PD4);
            PORTD |= (1 << PD5);

            _delay_ms(5000);

            PORTD &= ~(1 << PD4);
            PORTD &= ~(1 << PD5);
        }
    }
}